<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>So'zlar Imtihoni</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap");

      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        margin: 0;
        padding: 20px;
        min-height: 100vh;
        color: #333;
      }
      .container {
        max-width: 850px;
        margin: 0 auto;
        background: white;
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        overflow: hidden;
      }
      header {
        background: linear-gradient(135deg, #4c6ef5, #5b7cff);
        color: white;
        padding: 30px 40px;
        text-align: center;
      }
      h1 {
        margin: 0;
        font-size: 2.4rem;
        font-weight: 700;
      }
      .content {
        padding: 40px;
      }
      input[type="text"] {
        width: 100%;
        padding: 18px 20px;
        font-size: 1.3rem;
        border: 3px solid #e0e0e0;
        border-radius: 16px;
        margin: 15px 0;
        box-sizing: border-box;
        transition: all 0.3s;
      }
      input[type="text"]:focus {
        outline: none;
        border-color: #4c6ef5;
        box-shadow: 0 0 0 5px rgba(76, 110, 245, 0.2);
      }
      button {
        padding: 14px 32px;
        font-size: 1.1rem;
        font-weight: 600;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s;
      }
      .btn-primary {
        background: #4c6ef5;
        color: white;
      }
      .btn-primary:hover {
        background: #3b5ad1;
        transform: translateY(-3px);
      }
      .btn-secondary {
        background: #e0e0e0;
        color: #333;
      }
      .btn-secondary:hover {
        background: #c0c0c0;
      }
      .word-card {
        background: linear-gradient(135deg, #f8f9ff, #eef1ff);
        border: 4px solid #4c6ef5;
        border-radius: 20px;
        padding: 50px 30px;
        font-size: 2.2rem;
        font-weight: 600;
        text-align: center;
        margin: 30px 0;
        min-height: 140px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 30px rgba(76, 110, 245, 0.15);
      }
      .progress {
        text-align: center;
        font-size: 1.3rem;
        font-weight: 600;
        color: #4c6ef5;
        margin-bottom: 10px;
      }
      .result {
        padding: 18px;
        border-radius: 16px;
        margin: 20px 0;
        font-size: 1.2rem;
        text-align: center;
      }
      .correct {
        background: #d4f4e6;
        color: #1e9c6d;
        border: 2px solid #1e9c6d;
      }
      .wrong {
        background: #ffe0e0;
        color: #e74c3c;
        border: 2px solid #e74c3c;
      }
      .stats {
        background: #f8f9ff;
        padding: 25px;
        border-radius: 20px;
        margin-top: 30px;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Имя экрани -->
      <div id="name-screen">
        <header>
          <h1>So'zlar Imtihoni</h1>
        </header>
        <div class="content">
          <p style="text-align: center; font-size: 1.4rem; margin-bottom: 20px">
            Ismingizni kiriting:
          </p>
          <input
            type="text"
            id="student-name"
            placeholder="Ismingiz"
            autocomplete="off"
          />
          <div style="text-align: center; margin-top: 30px">
            <button class="btn-primary" onclick="startTest()">Boshlash</button>
          </div>
        </div>
      </div>

      <!-- Тест экрани -->
      <div id="test-screen" class="hidden">
        <header>
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 id="student-greeting" style="margin: 0; font-size: 1.6rem"></h2>
            <button class="btn-secondary" onclick="finishTest()">Erta tugatish</button>
          </div>
        </header>
        <div class="content">
          <div class="progress">
            <span id="current-num">1</span> / <span id="total-words">0</span> so'z
          </div>

          <div class="word-card" id="word-display"></div>

          <input
            type="text"
            id="answer-input"
            placeholder="So'zni yozing"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="none"
            spellcheck="false"
          />

          <div style="text-align: center; margin-top: 25px">
            <button class="btn-primary" onclick="checkAnswer()">Tekshirish</button>
            <button class="btn-secondary" onclick="nextWord()">O'tkazib yuborish</button>
          </div>

          <div id="feedback" class="result"></div>
        </div>
      </div>

      <!-- Натіжалар -->
      <div id="results-screen" class="hidden">
        <header>
          <h1>Natija</h1>
        </header>
        <div class="content">
          <div id="final-stats" class="stats"></div>
          <div style="text-align: center; margin-top: 30px">
            <button class="btn-primary" onclick="restartTest()">Yana boshlash</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      let words = [];
      let currentStudent = "";
      let currentIndex = 0;
      let correctAnswers = 0;
      let attempts = [];

      // So'zlarni yuklash
      async function loadWords() {
        try {
          const response = await fetch("words.json");
          if (!response.ok) throw new Error("Fayl topilmadi");
          words = await response.json();
          
          // Har safar tasodifiy tartibda chiqarish (yaxshi natija uchun)
          words = words.sort(() => Math.random() - 0.5);
        } catch (error) {
          console.error("Xatolik:", error);
          alert("So'zlar faylini yuklab bo'lmadi. words.json fayli mavjudligini tekshiring!");
        }
      }

      async function startTest() {
        const nameInput = document.getElementById("student-name").value.trim();
        if (!nameInput) {
          alert("Iltimos, ismingizni kiriting");
          return;
        }

        // Birinchi marta so'zlarni yuklaymiz
        if (words.length === 0) {
          await loadWords();
        }

        if (words.length === 0) {
          alert("So'zlar mavjud emas!");
          return;
        }

        currentStudent = nameInput;
        currentIndex = 0;
        correctAnswers = 0;
        attempts = [];

        document.getElementById("name-screen").classList.add("hidden");
        document.getElementById("test-screen").classList.remove("hidden");

        document.getElementById("student-greeting").textContent = `O'quvchi: ${currentStudent}`;
        document.getElementById("total-words").textContent = words.length;

        showCurrentWord();
      }

      function showCurrentWord() {
        if (currentIndex >= words.length) {
          finishTest();
          return;
        }

        document.getElementById("current-num").textContent = currentIndex + 1;
        document.getElementById("word-display").textContent = words[currentIndex].original;
        document.getElementById("answer-input").value = "";
        document.getElementById("feedback").innerHTML = "";
        document.getElementById("answer-input").focus();
      }

      function checkAnswer() {
        const input = document.getElementById("answer-input");
        const answer = input.value.trim().toLowerCase();
        const correct = words[currentIndex].translation.toLowerCase();

        const isCorrect = answer === correct;

        if (isCorrect) {
          correctAnswers++;
          document.getElementById("feedback").innerHTML = 
            `<div class="correct">✅ To'g'ri! ${words[currentIndex].original} — ${words[currentIndex].translation}</div>`;
        } else {
          document.getElementById("feedback").innerHTML = 
            `<div class="wrong">❌ Xato. To'g'ri javob: ${words[currentIndex].translation}</div>`;
        }

        attempts.push({
          word: words[currentIndex].original,
          studentAnswer: answer || "(bo'sh)",
          correctAnswer: correct,
          isCorrect: isCorrect,
        });

        setTimeout(() => {
          currentIndex++;
          showCurrentWord();
        }, 1600);
      }

      function nextWord() {
        attempts.push({
          word: words[currentIndex].original,
          studentAnswer: "(o'tkazib yuborildi)",
          correctAnswer: words[currentIndex].translation,
          isCorrect: false,
        });
        currentIndex++;
        showCurrentWord();
      }

      function finishTest() {
        document.getElementById("test-screen").classList.add("hidden");
        document.getElementById("results-screen").classList.remove("hidden");

        let percentage = words.length > 0 ? Math.round((correctAnswers / words.length) * 100) : 0;
        
        let html = `<h2 style="text-align:center;">${currentStudent}</h2>`;
        html += `<p style="text-align:center; font-size:1.6rem;">Natija: <strong>${correctAnswers} / ${words.length}</strong> (${percentage}%)</p>`;

        html += '<h3 style="margin-top:30px;">Javoblar tahlili:</h3>';
        attempts.forEach((a, i) => {
          html += `<p><strong>${i + 1}.</strong> ${a.word} — `;
          if (a.isCorrect) {
            html += `<span style="color:#1e9c6d;">${a.studentAnswer}</span>`;
          } else {
            html += `<span style="color:#e74c3c;">${a.studentAnswer}</span> <strong>(to'g'ri: ${a.correctAnswer})</strong>`;
          }
          html += "</p>";
        });

        document.getElementById("final-stats").innerHTML = html;
      }

      function restartTest() {
        document.getElementById("results-screen").classList.add("hidden");
        document.getElementById("name-screen").classList.remove("hidden");
        document.getElementById("student-name").value = "";
      }

      // Enter tugmasi
      document.addEventListener("keydown", (e) => {
        if (document.getElementById("test-screen").classList.contains("hidden")) return;
        if (e.key === "Enter") {
          checkAnswer();
        }
      });
    </script>
  </body>
</html>
